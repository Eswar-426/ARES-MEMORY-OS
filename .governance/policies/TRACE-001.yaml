api_version: v1
kind: Policy
metadata:
  name: TRACE-001
  version: "1.0"
  description: "Blocks orphan requirements"
  category: Traceability
  enforcement: Block
spec:
  rules:
    - name: "Require Traceability for Requirements"
      severity: Critical
      condition: missing_traceability
      target:
        - requirement
        - decision
      enforcement: Block
