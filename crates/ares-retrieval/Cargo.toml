[package]
name = "ares-retrieval"
version = "0.1.0"
edition = "2021"

[dependencies]
ares-core = { path = "../ares-core" }
ares-store = { path = "../ares-store" }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tokio = { version = "1.41", features = ["full"] }
uuid = { version = "1.11", features = ["v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"
tracing = "0.1"

[dev-dependencies]
tempfile = "3.10"
